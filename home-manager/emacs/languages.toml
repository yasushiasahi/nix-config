# ============================================================
# TypeSctipt / JavaSctipt
# ============================================================
[language-server.tsgo-ls]
command = "tsgo"
args = ["--lsp", "--stdio"]

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[[language]]
name = "javascript"
language-id = "javascript"
file-types = ["js", "mjs", "cjs", "rules", "es6", "pac", "jakefile"]
roots = ["package.json"]
language-servers = [
  { name = "tsgo-ls", except-features = [
    "format",
  ], support-workspace = [
    "package.json",
  ] },
  { name = "eslint", support-workspace = true, config-files = [
    ".eslintrc.js",
    ".eslintrc.cjs",
    ".eslintrc.yaml",
    ".eslintrc.yml",
    ".eslintrc",
    ".eslintrc.json",
    "eslint.config.js",
    "eslint.config.mjs",
    "eslint.config.cjs",
    "eslint.config.ts",
    "eslint.config.mts",
    "eslint.config.cts",
  ] },
  { name = "biome", config-files = [
    "biome.json",
    "biome.jsonc",
  ] },
]


[[language]]
name = "jsx"
language-id = "javascriptreact"
file-types = ["jsx"]
roots = ["package.json"]
language-servers = [
  { name = "tsgo-ls", except-features = [
    "format",
  ], support-workspace = [
    "package.json",
  ] },
  { name = "eslint", support-workspace = true, config-files = [
    ".eslintrc.js",
    ".eslintrc.cjs",
    ".eslintrc.yaml",
    ".eslintrc.yml",
    ".eslintrc",
    ".eslintrc.json",
    "eslint.config.js",
    "eslint.config.mjs",
    "eslint.config.cjs",
    "eslint.config.ts",
    "eslint.config.mts",
    "eslint.config.cts",
  ] },
  { name = "biome", config-files = [
    "biome.json",
    "biome.jsonc",
  ] },
]


